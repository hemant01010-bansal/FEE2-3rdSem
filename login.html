<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
    <style>
        *{
            margin: 0;
            padding: 0;
            font-family: "Google Sans", sans-serif;
        }

        nav{
            display: flex;
            background-color: aqua;
            height: 7vh;
            justify-content: space-between;
            padding: 0px 20px 0px 20px;
            align-items: center;
            font-size: 18px;
        }
        
        nav div{
            display: flex;
            gap: 20px;
        }

        nav li{
            list-style-type: none;
        }

        .cart{
            width: 20vw;
            padding: 10px;
            background-color: azure;
            border: 2px solid black;
            border-radius: 5px;
        }

        .cart img{
            width: 210px;
            height: 210px;
            border-radius: 5px;
        }

        main{
            width: 100%;
            height: 100vh;
            background: linear-gradient(white 40%,aqua, white);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        main div{
            width: 20vw;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border: 2px solid black;
            border-radius: 5px;
            padding: 10px;
            text-align: center;
            box-shadow: 10px 7px 20px 0px;
        }

        main div input{
            padding: 5px;
            border-radius: 5px;
        }

        main div button{
            background-color: white;
            border-radius: 5px;
            padding: 5px;
        }
        
        footer{
            box-sizing: border-box;
            width: 100%;
            background-color: aqua;
            padding: 50px;
            list-style-type: none;
            display: flex;
            justify-content: space-between;
        }

        .footerName{
            font-size: 30px;
            font-weight: 550;
        }

        .footerLinks{
            display: flex;
            gap: 30px;
        }

        .footerLinks li:hover{
            color: rgb(187, 94, 47);
            cursor: pointer;
        }

        .onlineLinks{
            background-color: aqua;
            display: flex;
            justify-content: center;
            gap: 10px;
            font-size: 20px;
            padding-bottom: 20px;
        }
    </style>
</head>
<body>
    <!-- position: relative; ->move with respect to it's parent box  -->
    <!-- position: absolute; ->move w.r.t that box which has position relative -->

     <nav>
        <div><li>Code Verse</li></div>
        <div>
            <li>Home</li>
            <li>Courses</li>
            <li>About</li>
        </div>
        <div>
            <i class="fa-regular fa-bell" style="color: rgb(0, 0, 0);"></i>
        </div>
     </nav>

     <main>
         <div>
            <h1>Welcome Back</h1>
            <input placeholder="Enter your Email:" type="email">
            <input placeholder="Enter your Password:" type="password">
            <button type="submit">Submit</button>
            <p>Forgot Password?</p>
            <p>Don't have an account? <strong style="color: rgb(187, 94, 47);">Sign Up</strong></p>
        </div>
     </main>

     <footer>
        <div class="footerName">Code Verse</div>
        <div class="footerLinks">
            <div class="footerLinks1">
                <li>About</li>
                <li>courses</li>
                <li>Help</li>
            </div>
            <div class="footerLinks2">
                <Li>Blogs</Li>
                <Li>Contact Us</Li>
            </div>
        </div>
    </footer>
    <div class="onlineLinks">
        <i class="fa-brands fa-facebook-f" style="color: rgb(0, 0, 0);"></i>
        <i class="fa-brands fa-instagram" style="color: rgb(0, 0, 0);"></i>
        <i class="fa-brands fa-whatsapp" style="color: rgb(0, 0, 0);"></i>
        <i class="fa-brands fa-linkedin" style="color: rgb(0, 0, 0);"></i>
    </div>
</body>
</html>
