        }
        
        console.log(a.name);  //Hemant

        b.age=18;
        console.log(Object.keys(b));  //['name', 'age']
        console.log(b.name);  //Hemant Bansal
        console.log(b["name"]);
        console.log(b["age"]);


        Object.keys(b).forEach((item)=>console.log(b[item]));
